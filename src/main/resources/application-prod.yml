spring:
  datasource:
    url: ${DB_URL:?DB_URL is required}
    username: ${DB_USERNAME:?DB_USERNAME is required}
    password: ${DB_PASSWORD:?DB_PASSWORD is required}
    driver-class-name: org.postgresql.Driver

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  data:
    redis:
      host: redis
      port: 6379
      timeout: 2000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  main:
    banner-mode: off

logging:
  level:
    root: INFO
    com.vimaltech.contactapi: DEBUG

server:
  error:
    include-stacktrace: always
    include-message: always

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

  endpoint:
    health:
      show-details: never

  metrics:
    tags:
      application: contact-api

app:
  mail:
    from: ${MAIL_FROM}