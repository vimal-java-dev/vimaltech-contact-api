spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:?DB_URL is required}
    username: ${SPRING_DATASOURCE_USERNAME:?DB_USERNAME is required}
    password: ${SPRING_DATASOURCE_PASSWORD:?DB_PASSWORD is required}
    driver-class-name: org.postgresql.Driver

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true

  main:
    banner-mode: off

logging:
  level:
    root: INFO
    com.vimaltech.contactapi: INFO
    org.springframework.web.servlet.resource: WARN
    org.springframework.web.servlet.PageNotFound: WARN

server:
  error:
    include-stacktrace: never
    include-message: always

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

  endpoint:
    health:
      show-details: always
      probes:
        enabled: true   # ✅ IMPORTANT
      group:
        readiness:
          include: db

  health:
    mail:
      enabled: false   # ✅ CRITICAL FIX

  metrics:
    tags:
      application: contact-api

  security:
    user:
      name: admin
      password: "{noop}${ADMIN_PASSWORD}"

app:
  mail:
    from: ${MAIL_FROM:?MAIL_FROM is required}
  admin:
    email: ${APP_ADMIN_EMAIL:?APP_ADMIN_EMAIL is required}