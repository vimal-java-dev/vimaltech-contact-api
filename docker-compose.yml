services:

  postgres:
    image: postgres:16
    container_name: vimaltech-postgres
    environment:
      POSTGRES_DB: contactdb
      POSTGRES_USER: contactuser
      POSTGRES_PASSWORD: contactpass
      TZ: Asia/Kolkata
    ports:
      - "5432:5432"
    volumes:
      - vimaltech_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contactuser -d contactdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - monitoring-network

  contact-api:
    build: .
    container_name: vimaltech-contact-api
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - .env.prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
    restart: unless-stopped
    networks:
      - monitoring-network

volumes:
  vimaltech_pgdata:

networks:
  monitoring-network:
    name: monitoring-network